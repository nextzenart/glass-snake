  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      background: linear-gradient(-45deg, #0f0f1e, #0a1a2e, #0f2a1f, #0a1a2e);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    .bg-animation::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(34, 197, 94, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(60, 130, 246, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
      animation: blob-float 20s ease-in-out infinite;
    }
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes blob-float { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(30px,-50px) rotate(120deg)} 66%{transform:translate(-20px,20px) rotate(240deg)} }

    .game-wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 420px;
    }
    .title {
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .back-link {
      font-size: 13px; color: rgba(255,255,255,0.4); text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #22c55e; }

    /* Score Bar */
    .score-bar {
      display: flex; gap: 12px; width: 100%; max-width: 420px;
    }
    .score-card {
      flex: 1; padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; text-align: center;
    }
    .score-card .label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
    .score-card .value { font-size: 28px; font-weight: 800; color: #22c55e; margin-top: 2px; }
    .score-card .value.best { color: #06b6d4; }

    /* Canvas Container */
    .canvas-container {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }
    canvas {
      display: block; border-radius: 14px;
      background: rgba(0,0,0,0.3);
    }

    /* Controls Hint */
    .controls-hint {
      font-size: 12px; color: rgba(255,255,255,0.3);
      text-align: center;
    }

    /* Overlay */
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10;
      background: rgba(15, 15, 30, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      opacity: 1; transition: opacity 0.3s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-box {
      text-align: center; padding: 40px;
    }
    .overlay-title {
      font-size: 36px; font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .overlay-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .overlay-score { font-size: 48px; font-weight: 800; color: #22c55e; margin-bottom: 8px; }
    .overlay-best { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }

    .play-btn {
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px 40px; border: none; border-radius: 14px; cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      color: white; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }
    .play-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(34, 197, 94, 0.4); }
    .play-btn:active { transform: translateY(0); }

    /* D-Pad for mobile */
    .dpad {
      display: none; margin-top: 8px;
    }
    .dpad-row { display: flex; justify-content: center; gap: 6px; margin: 3px 0; }
    .dpad-btn {
      width: 64px; height: 54px; border: none; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(34, 197, 94, 0.2); border-color: rgba(34, 197, 94, 0.4); }
    .dpad-btn.wide { width: 134px; }

    @media (max-width: 480px) {
      .dpad { display: block; }
      .controls-hint { display: none; }
    }
    @media (max-height: 700px) {
      .score-card .value { font-size: 22px; }
      .score-card { padding: 8px 12px; }
    }
  </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="game-wrapper">
  <div class="header">
    <span class="title">Glass Snake</span>
    <a href="https://glassgames.app" class="back-link">Glass Games &larr;</a>
  </div>

  <div class="score-bar">
    <div class="score-card">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-card">
      <div class="label">Best</div>
      <div class="value best" id="best">0</div>
    </div>
  </div>

  <div class="canvas-container" style="position:relative">
    <canvas id="game"></canvas>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-box">
        <div class="overlay-title">Glass Snake</div>
        <div class="overlay-sub">방향키 또는 스와이프로 뱀을 조종하세요<br><span style="opacity:0.7;font-size:12px">벽을 통과하면 반대편에서 나와요</span></div>
        <button class="play-btn" id="startBtn">플레이</button>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="overOverlay">
      <div class="overlay-box">
        <div class="overlay-title">Game Over</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="overlay-best" id="finalBest"></div>
        <button class="play-btn" id="restartBtn">다시 플레이</button>
      </div>
    </div>
  </div>

  <div class="controls-hint">방향키로 조작 &middot; Space로 시작</div>

  <!-- Mobile D-Pad -->
  <div class="dpad" id="dpad">
    <div class="dpad-row">
      <button class="dpad-btn wide" data-dir="UP" aria-label="위로">&#9650;</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="LEFT" aria-label="왼쪽">&#9664;</button>
      <button class="dpad-btn" data-dir="DOWN" aria-label="아래로">&#9660;</button>
      <button class="dpad-btn" data-dir="RIGHT" aria-label="오른쪽">&#9654;</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Sizing
  const COLS = 20;
  const ROWS = 20;
  let cellSize;
  function resize() {
    const maxW = Math.min(400, window.innerWidth - 56);
    cellSize = Math.floor(maxW / COLS);
    canvas.width = cellSize * COLS;
    canvas.height = cellSize * ROWS;
  }
  resize();
  window.addEventListener('resize', () => { resize(); draw(); });

  // Safe storage wrapper (handles private mode / blocked iframes)
  const safeStorage = (() => {
    try {
      const k = '__glass_test__';
      window.localStorage.setItem(k, '1');
      window.localStorage.removeItem(k);
      return window.localStorage;
    } catch (e) {
      const mem = {};
      return {
        getItem: (id) => (id in mem ? mem[id] : null),
        setItem: (id, v) => { mem[id] = String(v); },
        removeItem: (id) => { delete mem[id]; }
      };
    }
  })();

  // State
  let snake, dir, nextDir, food, score, best, running, gameLoop;
  best = parseInt(safeStorage.getItem('glass-snake-best') || '0', 10) || 0;
  document.getElementById('best').textContent = best;

  function init() {
    const mid = Math.floor(COLS / 2);
    snake = [
      { x: mid, y: Math.floor(ROWS / 2) },
      { x: mid - 1, y: Math.floor(ROWS / 2) },
      { x: mid - 2, y: Math.floor(ROWS / 2) }
    ];
    dir = 'RIGHT';
    nextDir = 'RIGHT';
    score = 0;
    document.getElementById('score').textContent = '0';
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // Drawing
  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, h); ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(w, i * cellSize); ctx.stroke();
    }

    // Food (glowing dot)
    if (food) {
      const fx = food.x * cellSize + cellSize / 2;
      const fy = food.y * cellSize + cellSize / 2;
      const r = cellSize * 0.35;

      // Glow
      const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, cellSize * 1.2);
      glow.addColorStop(0, 'rgba(239, 68, 68, 0.3)');
      glow.addColorStop(1, 'rgba(239, 68, 68, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(food.x * cellSize - cellSize, food.y * cellSize - cellSize, cellSize * 3, cellSize * 3);

      // Core
      ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Snake
    snake.forEach((seg, i) => {
      const x = seg.x * cellSize;
      const y = seg.y * cellSize;
      const pad = 1;
      const r = 4;

      // Color: head is bright green, body fades
      const t = i / Math.max(snake.length - 1, 1);
      const alpha = 1 - t * 0.5;

      if (i === 0) {
        // Head with glow
        ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 12;
        ctx.fillStyle = '#22c55e';
      } else {
        ctx.shadowBlur = 0;
        const g = Math.round(197 - t * 80);
        const b = Math.round(94 - t * 40);
        ctx.fillStyle = `rgba(34, ${g}, ${b}, ${alpha})`;
      }

      // Rounded rect
      const rx = x + pad, ry = y + pad, rw = cellSize - pad * 2, rh = cellSize - pad * 2;
      ctx.beginPath();
      ctx.moveTo(rx + r, ry);
      ctx.lineTo(rx + rw - r, ry); ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
      ctx.lineTo(rx + rw, ry + rh - r); ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
      ctx.lineTo(rx + r, ry + rh); ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
      ctx.lineTo(rx, ry + r); ctx.quadraticCurveTo(rx, ry, rx + r, ry);
      ctx.fill();

      // Glass highlight on head
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.ellipse(rx + rw / 2, ry + rh * 0.3, rw * 0.3, rh * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Border (glass effect)
      ctx.strokeStyle = `rgba(255,255,255,${0.15 - t * 0.1})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(rx + r, ry);
      ctx.lineTo(rx + rw - r, ry); ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + r);
      ctx.lineTo(rx + rw, ry + rh - r); ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - r, ry + rh);
      ctx.lineTo(rx + r, ry + rh); ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - r);
      ctx.lineTo(rx, ry + r); ctx.quadraticCurveTo(rx, ry, rx + r, ry);
      ctx.stroke();
    });
  }

  // Game logic
  function step() {
    dir = nextDir;
    const head = { ...snake[0] };

    if (dir === 'LEFT') head.x--;
    if (dir === 'RIGHT') head.x++;
    if (dir === 'UP') head.y--;
    if (dir === 'DOWN') head.y++;

    // Wall collision (wrap-around)
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score').textContent = score;
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    running = false;
    clearInterval(gameLoop);

    const prevBest = best;
    const isNewRecord = score > 0 && score > prevBest;

    if (isNewRecord) {
      best = score;
      safeStorage.setItem('glass-snake-best', best);
      document.getElementById('best').textContent = best;
    }

    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent =
      isNewRecord ? '새로운 최고 기록!' : `최고 기록: ${best}`;
    document.getElementById('overOverlay').classList.remove('hidden');
  }

  function startGame() {
    init();
    draw();
    running = true;
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('overOverlay').classList.add('hidden');
    gameLoop = setInterval(step, 120);
  }

  // Controls
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (!running) startGame();
      return;
    }
    if (!running) return;
    if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && dir !== 'RIGHT') nextDir = 'LEFT';
    if ((e.code === 'ArrowRight' || e.code === 'KeyD') && dir !== 'LEFT') nextDir = 'RIGHT';
    if ((e.code === 'ArrowUp' || e.code === 'KeyW') && dir !== 'DOWN') nextDir = 'UP';
    if ((e.code === 'ArrowDown' || e.code === 'KeyS') && dir !== 'UP') nextDir = 'DOWN';
    e.preventDefault();
  });

  // Touch / Swipe
  let touchStartX, touchStartY;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0 && dir !== 'LEFT') nextDir = 'RIGHT';
      else if (dx < 0 && dir !== 'RIGHT') nextDir = 'LEFT';
    } else {
      if (dy > 0 && dir !== 'UP') nextDir = 'DOWN';
      else if (dy < 0 && dir !== 'DOWN') nextDir = 'UP';
    }
    touchStartX = null;
  }, { passive: false });

  // D-Pad buttons
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!running) { startGame(); return; }
      const d = btn.dataset.dir;
      if (d === 'LEFT' && dir !== 'RIGHT') nextDir = 'LEFT';
      if (d === 'RIGHT' && dir !== 'LEFT') nextDir = 'RIGHT';
      if (d === 'UP' && dir !== 'DOWN') nextDir = 'UP';
      if (d === 'DOWN' && dir !== 'UP') nextDir = 'DOWN';
    });
  });

  // Buttons
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // Initial draw
  init();
  draw();
})();
</script>
</body>
</html>
